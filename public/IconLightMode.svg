<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- Light background -->
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </radialGradient>

    <!-- Glass body — frosted white panel -->
    <linearGradient id="glassFill" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="50%" stop-color="#f8faff" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#eef2ff" stop-opacity="0.75"/>
    </linearGradient>

    <!-- Cyan edge — deeper, saturated for light bg -->
    <linearGradient id="cyanRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0097a7"/>
      <stop offset="60%" stop-color="#00b8d4"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Violet left edge -->
    <linearGradient id="violetLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="60%" stop-color="#9b5de5"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Base gradient -->
    <linearGradient id="baseGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#0097a7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Shimmer refraction across glass face -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#e0f7fa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ede9fe" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Cutout fill — matches background -->
    <radialGradient id="cutoutFill" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#dde6f0"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </radialGradient>

    <!-- Apex radial burst -->
    <radialGradient id="apexBurst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0097a7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0097a7" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft drop shadow for glass panel -->
    <filter id="panelShadow" x="-10%" y="-5%" width="120%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="10"
        flood-color="#0097a7" flood-opacity="0.15"/>
    </filter>

    <!-- Crisp edge shadow for depth -->
    <filter id="edgeShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="3"
        flood-color="#00acc1" flood-opacity="0.25"/>
    </filter>

    <!-- Violet edge shadow -->
    <filter id="violetShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="-1" dy="2" stdDeviation="3"
        flood-color="#7c3aed" flood-opacity="0.2"/>
    </filter>

    <!-- Inner cutout border glow (subtle) -->
    <filter id="cutoutEdge" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="2"
        flood-color="#0097a7" flood-opacity="0.3"/>
    </filter>

  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="512" height="512" rx="88" ry="88" fill="url(#bg)"/>

  <!-- Subtle warm atmosphere -->
  <ellipse cx="256" cy="300" rx="200" ry="130"
    fill="#0097a7" fill-opacity="0.04"/>
  <ellipse cx="180" cy="250" rx="120" ry="90"
    fill="#7c3aed" fill-opacity="0.03"/>

  <!-- ── GLASS BODY with shadow ── -->
  <path d="M256 68 L432 430 Q434 442 422 444 H90 Q78 444 80 430 Z"
    fill="url(#glassFill)"
    filter="url(#panelShadow)"/>

  <!-- Shimmer overlay -->
  <path d="M256 68 L432 430 Q434 442 422 444 H90 Q78 444 80 430 Z"
    fill="url(#shimmer)"/>

  <!-- ── OUTER EDGES ── -->

  <!-- Right — cyan, two passes -->
  <line x1="256" y1="68" x2="432" y2="430"
    stroke="url(#cyanRight)" stroke-width="3"
    filter="url(#edgeShadow)"/>
  <line x1="256" y1="68" x2="432" y2="430"
    stroke="#0097a7" stroke-width="1.5"/>

  <!-- Left — violet, two passes -->
  <line x1="256" y1="68" x2="80" y2="430"
    stroke="url(#violetLeft)" stroke-width="3"
    filter="url(#violetShadow)"/>
  <line x1="256" y1="68" x2="80" y2="430"
    stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Base bar -->
  <line x1="80" y1="430" x2="432" y2="430"
    stroke="url(#baseGlow)" stroke-width="2.5"
    filter="url(#edgeShadow)"/>
  <line x1="80" y1="430" x2="432" y2="430"
    stroke="#0097a7" stroke-width="1"/>

  <!-- ── INNER CUTOUT ── -->
  <path d="M256 170 L376 410 H136 Z"
    fill="url(#cutoutFill)"
    filter="url(#cutoutEdge)"/>

  <!-- Cutout inner edges -->
  <line x1="256" y1="170" x2="376" y2="410"
    stroke="#0097a7" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="256" y1="170" x2="136" y2="410"
    stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.45"/>
  <line x1="136" y1="410" x2="376" y2="410"
    stroke="#0097a7" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Second bezel line on cutout -->
  <path d="M256 170 L376 410 H136 Z"
    fill="none"
    stroke="#0097a7" stroke-width="0.6" stroke-opacity="0.2"/>

  <!-- ── GLASS PANEL BORDER (full outer arch border) ── -->
  <path d="M256 68 L432 430 Q434 442 422 444 H90 Q78 444 80 430 Z"
    fill="none"
    stroke="#ffffff" stroke-width="1" stroke-opacity="0.7"/>

  <!-- ── APEX ── -->
  <circle cx="256" cy="68" r="22"
    fill="url(#apexBurst)"/>
  <circle cx="256" cy="68" r="12"
    fill="none" stroke="#0097a7" stroke-width="1.2" stroke-opacity="0.4"/>
  <circle cx="256" cy="68" r="7"
    fill="none" stroke="#0097a7" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="256" cy="68" r="3.5"
    fill="#0097a7"
    filter="url(#edgeShadow)"/>

  <!-- ── CORNER DOTS ── -->
  <circle cx="80" cy="430" r="3"
    fill="#7c3aed" opacity="0.85"
    filter="url(#violetShadow)"/>
  <circle cx="432" cy="430" r="3"
    fill="#0097a7" opacity="0.85"
    filter="url(#edgeShadow)"/>

  <!-- ── REFRACTION LINES ── -->
  <line x1="185" y1="210" x2="315" y2="165"
    stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="175" y1="300" x2="335" y2="240"
    stroke="#e0f7fa" stroke-width="0.7" stroke-opacity="0.3"/>

</svg>